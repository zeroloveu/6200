services:
  vote-station:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vote-station
    env_file:
      - .env
    environment:
      APP_DATABASE_URL: sqlite:////app/data/fastapi_vote.db
      PYTHONUNBUFFERED: "1"
    expose:
      - "8000"
    volumes:
      - vote-data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    container_name: vote-station-caddy
    depends_on:
      - vote-station
    environment:
      APP_PUBLIC_DOMAIN: ${APP_PUBLIC_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  vote-data:
  caddy-data:
  caddy-config:
